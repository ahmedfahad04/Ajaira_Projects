<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human or AI Code Detection</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; color: #00d4ff; }
        .stats { display: flex; justify-content: center; gap: 40px; margin-bottom: 20px; font-size: 18px; }
        .stat { text-align: center; }
        .stat-value { font-size: 32px; font-weight: bold; color: #00d4ff; }
        .stat-label { color: #888; }
        .buttons { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .btn { padding: 15px 40px; font-size: 20px; border: none; border-radius: 8px; cursor: pointer; transition: transform 0.2s; }
        .btn:hover { transform: scale(1.05); }
        .btn-ai { background: #ff6b6b; color: white; }
        .btn-human { background: #4ecdc4; color: white; }
        #code-display { background: #16213e; border-radius: 8px; padding: 20px; font-family: 'Monaco', 'Consolas', monospace; font-size: 14px; line-height: 1.5; overflow-x: auto; white-space: pre; max-height: 70vh; overflow-y: auto; border: 2px solid #0f3460; }
        .answer { display: none; text-align: center; padding: 20px; margin-top: 20px; border-radius: 8px; }
        .answer.reveal { display: block; }
        .answer.correct { background: #1b4332; border: 2px solid #2d6a4f; }
        .answer.wrong { background: #4a1515; border: 2px solid #6a1b1b; }
        .answer h2 { margin-bottom: 10px; }
        .next-btn { display: block; margin: 20px auto; padding: 12px 30px; font-size: 16px; background: #00d4ff; color: #1a1a2e; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .next-btn:hover { background: #00b8e6; }
        .skip-btn { display: block; margin: 10px auto; padding: 8px 20px; font-size: 14px; background: transparent; color: #666; border: 1px solid #444; border-radius: 8px; cursor: pointer; }
        .skip-btn:hover { color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Human or AI Code Detection</h1>
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="correct">0</div>
                <div class="stat-label">Correct</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="total">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="accuracy">0%</div>
                <div class="stat-label">Accuracy</div>
            </div>
        </div>
        <div class="buttons">
            <button class="btn btn-ai" onclick="guess('ai')">AI Generated</button>
            <button class="btn btn-human" onclick="guess('human')">Human Written</button>
        </div>
        <button class="skip-btn" onclick="skip()">Skip (show answer)</button>
        <pre id="code-display">Loading...</pre>
        <div class="answer" id="answer">
            <h2 id="answer-text"></h2>
            <p id="answer-detail"></p>
        </div>
        <button class="next-btn" onclick="nextCode()">Next Code</button>
    </div>

    <script>
        const baseDir = './extracted_code';
        const models = [
            'human_eval_claude_default',
            'human_eval_qwen2_5-coder_7b', 
            'class_eval_claude_default',
            'class_eval_qwen2_5-coder_7b'
        ];
        let currentFile = null;
        let currentIsAI = null;
        let correct = 0;
        let total = 0;

        async function loadCode(file) {
            try {
                const response = await fetch(file.file);
                if (!response.ok) {
                    console.log('File not found:', file.file);
                    return null;
                }
                return await response.text();
            } catch (e) {
                console.log('Error:', e, file.file);
                return null;
            }
        }

        const taskCounts = {
            'human_eval_claude_default': 100,
            'human_eval_qwen2_5-coder_7b': 100,
            'class_eval_claude_default': 100,
            'class_eval_qwen2_5-coder_7b': 100
        };

        function pickRandom() {
            const model = models[Math.floor(Math.random() * models.length)];
            const taskId = Math.floor(Math.random() * taskCounts[model]);
            const taskStr = String(taskId).padStart(4, '0');
            const isBase = Math.random() < 0.5;
            const variant = isBase ? 0 : Math.floor(Math.random() * 5) + 1;

            currentFile = {
                model,
                taskId: taskStr,
                type: isBase ? 'base' : `variant_${variant}`,
                file: `${baseDir}/${model}/task_${taskStr}/${isBase ? 'base' : 'variant_' + variant}.py`,
                isAI: !isBase
            };
        }

        let pickedThisRound = null;

        async function nextCode() {
            document.getElementById('answer').className = 'answer';
            document.getElementById('answer').style.display = 'none';

            pickRandom();
            currentIsAI = currentFile.isAI;

            const code = await loadCode(currentFile);
            document.getElementById('code-display').textContent = code;
        }

        function guess(type) {
            const isCorrect = (type === 'ai' && currentIsAI) || (type === 'human' && !currentIsAI);
            total++;
            if (isCorrect) correct++;

            updateStats();
            showAnswer();
        }

        function skip() {
            showAnswer();
        }

        function showAnswer() {
            const actual = currentIsAI ? 'AI Generated' : 'Human Written (Ground Truth)';
            const model = currentFile.model;
            const taskId = currentFile.taskId;
            const type = currentFile.type;

            document.getElementById('answer-text').textContent = actual;
            document.getElementById('answer-detail').textContent = `Model: ${model} | Task: ${taskId} | ${type}`;
            document.getElementById('answer').style.display = 'block';

            const isCorrectNow = (document.querySelector('.answer').className === 'answer correct');
            if (isCorrectNow || true) {
                document.getElementById('answer').className = 'answer correct';
            }
        }

        function updateStats() {
            document.getElementById('correct').textContent = correct;
            document.getElementById('total').textContent = total;
            document.getElementById('accuracy').textContent = total > 0 ? Math.round(correct / total * 100) + '%' : '0%';
        }

        nextCode();
    </script>
</body>
</html>
