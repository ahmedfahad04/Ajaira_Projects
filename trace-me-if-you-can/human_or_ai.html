<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human or AI Code Detection</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; padding: 14px; }
        .container { height: 100%; display: grid; grid-template-rows: auto auto 1fr; gap: 12px; }
        h1 { text-align: center; color: #00d4ff; font-size: 28px; }
        .stats { display: flex; justify-content: center; gap: 40px; font-size: 16px; }
        .stat { text-align: center; }
        .stat-value { font-size: 28px; font-weight: bold; color: #00d4ff; }
        .stat-label { color: #8ca2c3; }
        .main-grid { min-height: 0; display: grid; grid-template-columns: 360px 1fr; gap: 12px; }
        .left-panel, .right-panel { min-height: 0; background: #101a33; border: 1px solid #22345a; border-radius: 10px; }
        .left-panel { padding: 14px; display: flex; flex-direction: column; }
        .right-panel { padding: 12px; display: grid; grid-template-rows: auto 1fr auto; gap: 10px; }
        .meta { color: #9db3d1; font-size: 13px; }
        .comment-wrap { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
        .comment-label { color: #cfe6ff; font-weight: 600; font-size: 14px; }
        .comment-box {
            width: 100%;
            height: 220px;
            background: #111b35;
            color: #eef5ff;
            border: 1px solid #2a3f6b;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            line-height: 1.4;
            resize: none;
        }
        .comment-help { color: #7f96b6; font-size: 12px; }
        .buttons { display: flex; gap: 8px; margin-top: 12px; }
        .buttons.secondary-actions { margin-top: 26px; }
        .btn {
            flex: 1;
            padding: 12px 10px;
            font-size: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-ai { background: #ff6b6b; color: #fff; }
        .btn-human { background: #4ecdc4; color: #06282a; }
        .next-btn { background: #00d4ff; color: #1a1a2e; }
        .finish-btn { background: #ffd166; color: #2b2200; }
        #code-display {
            background: #16213e;
            border-radius: 8px;
            padding: 16px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre;
            overflow: auto;
            min-height: 0;
            border: 2px solid #0f3460;
        }
        .answer { display: none; padding: 10px; border-radius: 8px; font-size: 14px; }
        .answer.correct { display: block; background: #1b4332; border: 1px solid #2d6a4f; }
        .answer.wrong { display: block; background: #4a1515; border: 1px solid #6a1b1b; }
        .answer h2 { margin-bottom: 6px; font-size: 16px; }
        @media (max-width: 980px) {
            .main-grid { grid-template-columns: 1fr; }
            .comment-box { height: 140px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Human or AI Code Detection</h1>
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="correct">0</div>
                <div class="stat-label">Correct</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="total">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="accuracy">0%</div>
                <div class="stat-label">Accuracy</div>
            </div>
        </div>
        <div class="main-grid">
            <section class="left-panel">
                <div class="comment-wrap">
                    <label class="comment-label" for="reason-box">Why do you think this is AI or human?</label>
                    <textarea
                        id="reason-box"
                        class="comment-box"
                        placeholder="Write a short reason or a detailed explanation..."
                    ></textarea>
                    <div class="comment-help">Autosaved in localStorage for this browser session.</div>
                </div>
                <div class="buttons">
                    <button id="btn-ai" class="btn btn-ai" onclick="guess('ai')">AI Generated</button>
                    <button id="btn-human" class="btn btn-human" onclick="guess('human')">Human Written</button>
                </div>
                <div class="buttons secondary-actions">
                    <button class="btn next-btn" onclick="nextCode()">Next Code</button>
                    <button class="btn finish-btn" onclick="finishSession()">Finish</button>
                </div>
            </section>
            <section class="right-panel">
                <!-- <div class="meta" id="code-meta">Loading metadata...</div> -->
                <pre id="code-display">Loading...</pre>
                <div class="answer" id="answer">
                    <h2 id="answer-text"></h2>
                    <p id="answer-detail"></p>
                </div>
            </section>
        </div>
    </div>

    <script>
        let baseDir = './extracted_code';
        const baseDirCandidates = [
            './extracted_code',
            '../extracted_code',
            '../../extracted_code',
            '/extracted_code',
            './trace-me-if-you-can/extracted_code',
            '../trace-me-if-you-can/extracted_code'
        ];
        const models = [
            'human_eval_claude_default',
            'human_eval_qwen2_5-coder_7b', 
            'class_eval_claude_default',
            'class_eval_qwen2_5-coder_7b'
        ];
        let currentFile = null;
        let currentIsAI = null;
        let correct = 0;
        let total = 0;
        let baseDirReady = false;
        let questionStartedAtMs = null;
        let answeredThisRound = false;
        let lastGuessWasCorrect = null;
        const sessionId = sessionStorage.getItem('humanOrAiSessionId') || `session_${Date.now()}`;
        sessionStorage.setItem('humanOrAiSessionId', sessionId);
        const storageKey = `human_or_ai_comments_${sessionId}`;
        let commentsStore = loadCommentsStore();
        let hasDownloaded = false;

        function loadCommentsStore() {
            try {
                const raw = localStorage.getItem(storageKey);
                if (!raw) return { entries: {} };
                const parsed = JSON.parse(raw);
                if (!parsed || typeof parsed !== 'object' || !parsed.entries) {
                    return { entries: {} };
                }
                return parsed;
            } catch (e) {
                return { entries: {} };
            }
        }

        function saveCommentsStore() {
            localStorage.setItem(storageKey, JSON.stringify(commentsStore));
        }

        function getDatasetAndModel(modelName) {
            if (modelName.startsWith('human_eval_')) {
                return { dataset: 'human_eval', model: modelName.replace('human_eval_', '') };
            }
            if (modelName.startsWith('class_eval_')) {
                return { dataset: 'class_eval', model: modelName.replace('class_eval_', '') };
            }
            return { dataset: 'unknown', model: modelName };
        }

        function fileKey(fileInfo) {
            return `${fileInfo.model}|${fileInfo.taskId}|${fileInfo.type}`;
        }

        function upsertCurrentEntry(patch = {}) {
            if (!currentFile) return;
            const reasonBox = document.getElementById('reason-box');
            const { dataset, model } = getDatasetAndModel(currentFile.model);
            const filename = currentFile.type === 'base' ? 'base.py' : `${currentFile.type}.py`;
            const key = fileKey(currentFile);
            const existing = commentsStore.entries[key] || {};

            commentsStore.entries[key] = {
                model,
                dataset,
                task: `task_${currentFile.taskId}`,
                filename,
                comment: existing.comment ?? '',
                initialPrediction: existing.initialPrediction ?? null,
                updatedAt: new Date().toISOString(),
                ...patch
            };

            if (!('comment' in patch)) {
                commentsStore.entries[key].comment = reasonBox.value.trim();
            }
            saveCommentsStore();
        }

        function saveCurrentComment() {
            upsertCurrentEntry();
        }

        function loadCommentForCurrentFile() {
            if (!currentFile) return;
            const reasonBox = document.getElementById('reason-box');
            const key = fileKey(currentFile);
            reasonBox.value = commentsStore.entries[key]?.comment || '';
        }

        function updateMeta() {
            if (!currentFile) return;
            const { dataset, model } = getDatasetAndModel(currentFile.model);
            const filename = currentFile.type === 'base' ? 'base.py' : `${currentFile.type}.py`;
            document.getElementById('code-meta').textContent =
                `Model: ${model} | Dataset: ${dataset} | File: ${filename} | Task: task_${currentFile.taskId}`;
        }

        function buildMarkdown() {
            const entries = Object.values(commentsStore.entries).filter((entry) =>
                (entry.comment && entry.comment.length > 0) ||
                entry.initialPrediction ||
                entry.responseTimeSeconds !== null
            );
            entries.sort((a, b) => {
                const aKey = `${a.dataset}|${a.model}|${a.task}|${a.filename}`;
                const bKey = `${b.dataset}|${b.model}|${b.task}|${b.filename}`;
                return aKey.localeCompare(bKey);
            });

            const lines = [];
            lines.push('# Human or AI Comment Notes');
            lines.push('');
            lines.push(`Generated: ${new Date().toISOString()}`);
            lines.push('');

            if (entries.length === 0) {
                lines.push('_No comments/predictions were saved in this session._');
                lines.push('');
                return lines.join('\n');
            }

            for (const entry of entries) {
                lines.push(`## ${entry.model} | ${entry.dataset} | ${entry.filename}`);
                lines.push('');
                lines.push(entry.comment);
                lines.push('');
                lines.push(`Task: ${entry.task}`);
                lines.push(`Initial Prediction: ${entry.initialPrediction ?? 'N/A'}`);
                lines.push(`Response Time (seconds): ${entry.responseTimeSeconds ?? 'N/A'}`);
                lines.push('');
            }
            return lines.join('\n');
        }

        function setGuessButtonsDisabled(disabled) {
            document.getElementById('btn-ai').disabled = disabled;
            document.getElementById('btn-human').disabled = disabled;
        }

        function downloadMarkdown() {
            if (hasDownloaded) return;
            const markdown = buildMarkdown();
            const blob = new Blob([markdown], { type: 'text/markdown;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            const stamp = new Date().toISOString().replace(/[:.]/g, '-');
            link.href = url;
            link.download = `human-or-ai-comments-${stamp}.md`;
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(url);
            hasDownloaded = true;
        }

        async function detectBaseDir() {
            if (baseDirReady) return true;

            if (window.location.protocol === 'file:') {
                document.getElementById('code-display').textContent =
                    'This page is opened with file://, and browsers block loading local .py files via fetch(). Please run a local web server from this project folder and open the page over http://localhost (for example with VS Code Live Server).';
                return false;
            }

            const probePath = 'human_eval_claude_default/task_0000/base.py';
            for (const candidate of baseDirCandidates) {
                try {
                    const probeUrl = `${candidate}/${probePath}`;
                    const response = await fetch(probeUrl, { cache: 'no-store' });
                    if (response.ok) {
                        baseDir = candidate;
                        baseDirReady = true;
                        return true;
                    }
                } catch (e) {
                    // keep trying candidates
                }
            }

            document.getElementById('code-display').textContent =
                'Could not locate extracted_code from this URL. Please serve/open human_or_ai.html from the repository root.';
            return false;
        }

        async function loadCode(file) {
            try {
                const response = await fetch(file.file);
                if (!response.ok) {
                    console.log(`File not found (${response.status}):`, file.file);
                    return null;
                }
                return await response.text();
            } catch (e) {
                console.log('Error:', e, file.file);
                return null;
            }
        }

        const taskCounts = {
            'human_eval_claude_default': 100,
            'human_eval_qwen2_5-coder_7b': 100,
            'class_eval_claude_default': 100,
            'class_eval_qwen2_5-coder_7b': 100
        };

        function pickRandom() {
            const model = models[Math.floor(Math.random() * models.length)];
            const taskId = Math.floor(Math.random() * taskCounts[model]);
            const taskStr = String(taskId).padStart(4, '0');
            const isBase = Math.random() < 0.5;
            const variant = isBase ? 0 : Math.floor(Math.random() * 5) + 1;

            currentFile = {
                model,
                taskId: taskStr,
                type: isBase ? 'base' : `variant_${variant}`,
                file: `${baseDir}/${model}/task_${taskStr}/${isBase ? 'base' : 'variant_' + variant}.py`,
                isAI: !isBase
            };
        }

        let pickedThisRound = null;

        async function nextCode() {
            saveCurrentComment();
            document.getElementById('reason-box').value = '';
            document.getElementById('answer').className = 'answer';
            document.getElementById('answer').style.display = 'none';
            document.getElementById('code-display').textContent = 'Loading...';
            answeredThisRound = false;
            setGuessButtonsDisabled(false);
            const ready = await detectBaseDir();
            if (!ready) return;

            const maxAttempts = 40;
            let code = null;
            let attempts = 0;

            while (attempts < maxAttempts) {
                pickRandom();
                currentIsAI = currentFile.isAI;
                code = await loadCode(currentFile);
                if (code !== null) break;
                attempts++;
            }

            if (code === null) {
                document.getElementById('code-display').textContent =
                    'Unable to load code sample. Please make sure you are serving this folder from a local web server and that extracted_code files are present.';
                document.getElementById('code-meta').textContent = '';
                document.getElementById('reason-box').value = '';
                return;
            }

            document.getElementById('code-display').textContent = code;
            updateMeta();
            questionStartedAtMs = Date.now();
        }

        function guess(type) {
            if (answeredThisRound) return;
            answeredThisRound = true;
            setGuessButtonsDisabled(true);
            const initialPrediction = type === 'ai' ? 'AI Generated' : 'Human Written';
            const elapsedSeconds = questionStartedAtMs === null
                ? null
                : Number((Math.max(0, Date.now() - questionStartedAtMs) / 1000).toFixed(2));
            upsertCurrentEntry({
                comment: document.getElementById('reason-box').value.trim(),
                initialPrediction,
                responseTimeSeconds: elapsedSeconds
            });
            questionStartedAtMs = null;
            const isCorrect = (type === 'ai' && currentIsAI) || (type === 'human' && !currentIsAI);
            lastGuessWasCorrect = isCorrect;
            total++;
            if (isCorrect) correct++;

            updateStats();
            showAnswer();
        }

        function showAnswer() {
            const actual = currentIsAI ? 'AI Generated' : 'Human Written (Ground Truth)';
            const model = currentFile.model;
            const taskId = currentFile.taskId;
            const type = currentFile.type;

            document.getElementById('answer-text').textContent = actual;
            document.getElementById('answer-detail').textContent = `Model: ${model} | Task: ${taskId} | ${type}`;
            document.getElementById('answer').style.display = 'block';
            document.getElementById('answer').className = `answer ${lastGuessWasCorrect ? 'correct' : 'wrong'}`;
        }

        function updateStats() {
            document.getElementById('correct').textContent = correct;
            document.getElementById('total').textContent = total;
            document.getElementById('accuracy').textContent = total > 0 ? Math.round(correct / total * 100) + '%' : '0%';
        }

        function finishSession() {
            saveCurrentComment();
            downloadMarkdown();
        }

        document.getElementById('reason-box').addEventListener('input', saveCurrentComment);
        window.addEventListener('beforeunload', () => {
            saveCurrentComment();
            downloadMarkdown();
        });

        nextCode();
    </script>
</body>
</html>
